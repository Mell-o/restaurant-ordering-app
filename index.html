<html>
    <head>
       <link rel="stylesheet" href="index.css">
       <link rel="preconnect" href="https://fonts.googleapis.com">
       <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
       <link href="https://fonts.googleapis.com/css2?family=Smythe&display=swap" rel="stylesheet">
    </head>
    <body>
    <header class="site-header">
        <h1 class="site-title">Jimmy's Diner</h1>
        <p class="tagline">The best burgers and pizzas in town.</p>
    </header>
    <main>
        <section class="food-menu">
            <ul>
                <li class="menu-item">
                    <span class="food-emoji" role="img" aria-label="${name}"></span>
                    <div class="menu-item-content">
                        <h2>Pizza</h2>
                        <p class="food-ingredients">pepperoni, mushroom, mozarella</p>
                        <p class="food-price">$14</p>
                    </div>
                    <button type="button" onclick="">+</button>
                </li>
            </ul>
        </section>
    </main>
	<script src="index.js" type="module"></script>
    </body>
</html>
